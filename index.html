<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คำนวณราคาภาพ 28APR</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,sans-serif;
  background:radial-gradient(circle at top,#4a3400 0%,#151515 38%,#070707 100%);
  color:#fff;
  padding:18px;
}

.wrap{max-width:760px;margin:auto}
.header{text-align:center;margin:26px 0 22px}

.badge{
  display:inline-block;
  background:linear-gradient(135deg,#ffdd33,#ff9900);
  color:#111;
  padding:7px 16px;
  border-radius:999px;
  font-weight:900;
}

h1{font-size:36px;margin:16px 0 6px}
.sub{color:#cfcfcf;margin:0;font-size:15px}

.panel{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.13);
  backdrop-filter:blur(14px);
  border-radius:26px;
  padding:20px;
}

.section{margin:24px 0}
.section h2{font-size:18px;margin:0 0 12px;color:#ffdc4d}

.grid{display:grid;gap:12px}

.option-card{
  display:block;
  position:relative;
  cursor:pointer;
  background:rgba(255,255,255,.075);
  border:1px solid rgba(255,255,255,.14);
  border-radius:18px;
  padding:16px;
  transition:.22s ease;
  overflow:hidden;
}

.option-card:hover{
  transform:translateY(-2px);
  border-color:#ffcc00;
}

.option-card input{
  position:absolute;
  opacity:0;
  pointer-events:none;
}

.option-card:has(input:checked){
  background:linear-gradient(135deg,rgba(255,204,0,.26),rgba(255,255,255,.085));
  border-color:#ffcc00;
}

.title{font-weight:850;font-size:17px}
.desc{color:#bdbdbd;font-size:14px;margin-top:5px;line-height:1.45}
.price{font-size:26px;font-weight:950;color:#00ff99;margin-top:8px}

.tone-segment{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  background:rgba(0,0,0,.35);
  border:1px solid rgba(255,255,255,.14);
  border-radius:18px;
  padding:6px;
  gap:6px;
}

.tone-segment label{
  position:relative;
  cursor:pointer;
  text-align:center;
  border-radius:14px;
  padding:14px 8px;
  font-weight:900;
  color:#ccc;
  transition:.22s ease;
}

.tone-segment input{
  position:absolute;
  opacity:0;
  pointer-events:none;
}

.tone-segment label:has(input:checked){
  background:linear-gradient(135deg,#ffdd33,#ff9900);
  color:#111;
  box-shadow:0 8px 22px rgba(255,153,0,.25);
}

.option-wrap{
  max-height:1200px;
  opacity:1;
  transform:translateY(0);
  transition:.35s ease;
  overflow:hidden;
}

.option-wrap.hide{
  max-height:0;
  opacity:0;
  transform:translateY(-8px);
  pointer-events:none;
  margin:0;
}

.sample-box{
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.14);
  border-radius:20px;
  overflow:hidden;
  margin-top:12px;
}

.sample-box img{
  width:100%;
  display:block;
}

.sample-info{
  padding:15px;
  color:#ddd;
  line-height:1.7;
}

.sample-tag{
  display:inline-block;
  background:#ffdd33;
  color:#111;
  padding:5px 10px;
  border-radius:999px;
  font-weight:900;
  margin-bottom:8px;
}

.totalBox{
  margin-top:24px;
  background:#050505;
  border:1px solid rgba(0,255,153,.38);
  border-radius:24px;
  padding:20px;
  text-align:center;
}

.totalText{color:#aaa;font-size:14px}
.totalPrice{font-size:50px;font-weight:950;color:#00ff99}

textarea{
  width:100%;
  height:178px;
  margin-top:15px;
  border:1px solid rgba(255,255,255,.12);
  border-radius:18px;
  padding:15px;
  background:#101010;
  color:#fff;
  font-size:15px;
  line-height:1.5;
  resize:none;
  outline:none;
}

button{
  width:100%;
  border:0;
  border-radius:18px;
  background:linear-gradient(135deg,#ffdd33,#ff9900);
  color:#111;
  padding:16px;
  font-size:18px;
  font-weight:950;
  cursor:pointer;
  margin-top:12px;
}

.footer{
  text-align:center;
  color:#8d8d8d;
  font-size:13px;
  margin:18px 0;
}

.note{
  color:#999;
  font-size:13px;
  margin-top:8px;
}

@media (min-width:680px){
  .two-col{grid-template-columns:1fr 1fr}
}
</style>
</head>

<body>

<div class="wrap">

  <div class="header">
    <div class="badge">28APR PHOTO RATE</div>
    <h1>คำนวณราคาภาพ</h1>
    <p class="sub">เลือกแพ็กเกจ ดูยอดรวม และคัดลอกข้อความส่งลูกค้าได้ทันที</p>
  </div>

  <div class="panel">

    <div class="section">
      <h2>1. เลือกประเภทเหมา</h2>
      <div class="grid two-col">
        <label class="option-card">
          <input type="radio" name="tripType" value="single" checked>
          <div class="title">ขาเดียว</div>
          <div class="desc">ขาขึ้น หรือ ขาลง</div>
        </label>

        <label class="option-card">
          <input type="radio" name="tripType" value="both">
          <div class="title">2 ขา</div>
          <div class="desc">ขาขึ้น + ขาลง</div>
        </label>
      </div>
    </div>

    <div class="section">
      <h2>2. เลือกแพ็กเกจ</h2>
      <div id="packageArea" class="grid"></div>
    </div>

    <div id="sampleSection" class="section option-wrap">
      <h2>ตัวอย่างงาน</h2>
      <div id="sampleArea"></div>
    </div>

    <div id="toneSection" class="section option-wrap hide">
      <h2>3. เลือกโทนภาพหลัก</h2>

      <div class="tone-segment">
        <label>
          <input type="radio" name="mainTone" value="A" checked>
          โทน A
        </label>

        <label>
          <input type="radio" name="mainTone" value="B">
          โทน B
        </label>

        <label>
          <input type="radio" name="mainTone" value="C">
          โทน C
        </label>
      </div>

      <div id="tonePreview"></div>

      <div class="note">โทนที่เลือกเป็นโทนหลัก จะไม่แสดงซ้ำใน Option เพิ่ม</div>
    </div>

    <div id="optionSection" class="section option-wrap">
      <h2 id="optionTitle">3. Option เพิ่ม รายการละ 100฿</h2>
      <div id="optionArea" class="grid"></div>
    </div>

    <div class="totalBox">
      <div class="totalText">ยอดรวมทั้งหมด</div>
      <div class="totalPrice"><span id="total">300</span>฿</div>
    </div>

    <textarea id="summary" readonly></textarea>

    <button onclick="copySummary()">คัดลอกข้อความสรุป</button>

  </div>

  <div class="footer">28APR : Automotive Photography</div>

</div>

<script>
const prices = {
  single: [
    {
      name:"ภาพหลังกล้อง JPG 3000px",
      price:300,
      type:"jpg",
      desc:"ไฟล์ JPG หลังกล้อง ขนาด 3000px"
    },
    {
      name:"แต่งภาพสีกลาง ไฟล์ใหญ่ + 2048px",
      price:400,
      type:"neutral",
      desc:"ได้ไฟล์ใหญ่ และไฟล์ 2048px"
    },
    {
      name:"แต่งภาพโทนเพจ ไฟล์ใหญ่ + 2048px",
      price:500,
      type:"pageTone",
      desc:"เลือกโทนหลัก A / B / C ได้"
    }
  ],

  both: [
    {
      name:"ภาพหลังกล้อง JPG 3000px",
      price:500,
      type:"jpg",
      desc:"ไฟล์ JPG หลังกล้อง ขนาด 3000px"
    },
    {
      name:"แต่งภาพสีกลาง ไฟล์ใหญ่ + 2048px",
      price:800,
      type:"neutral",
      desc:"ได้ไฟล์ใหญ่ และไฟล์ 2048px"
    },
    {
      name:"แต่งภาพโทนเพจ ไฟล์ใหญ่ + 2048px",
      price:1000,
      type:"pageTone",
      desc:"เลือกโทนหลัก A / B / C ได้"
    }
  ]
};

function renderPackages(){
  const tripType = document.querySelector('input[name="tripType"]:checked').value;
  const area = document.getElementById("packageArea");

  area.innerHTML = "";

  prices[tripType].forEach((pkg,index)=>{
    area.innerHTML += `
      <label class="option-card">
        <input
          type="radio"
          name="package"
          value="${pkg.price}"
          data-name="${pkg.name}"
          data-type="${pkg.type}"
          ${index === 0 ? "checked" : ""}
        >
        <div class="title">${pkg.name}</div>
        <div class="desc">${pkg.desc}</div>
        <div class="price">${pkg.price}฿</div>
      </label>
    `;
  });

  document.querySelectorAll('input[name="package"]').forEach(el=>{
    el.addEventListener('change',()=>{
      renderSample();
      renderTone();
      renderTonePreview();
      renderOptions();
      calculate();
    });
  });

  renderSample();
  renderTone();
  renderTonePreview();
  renderOptions();
  calculate();
}

function renderSample(){
  const pkg = document.querySelector('input[name="package"]:checked');
  const pkgType = pkg.dataset.type;
  const sampleSection = document.getElementById("sampleSection");
  const sampleArea = document.getElementById("sampleArea");

  sampleArea.innerHTML = "";

  if(pkgType === "jpg"){
    sampleSection.classList.remove("hide");
    sampleArea.innerHTML = `
      <div class="sample-box">
        <img src="image/sample-jpg.jpg" alt="ตัวอย่างไฟล์ JPG หลังกล้อง">
        <div class="sample-info">
          <div class="sample-tag">JPG หลังกล้อง 3000px</div><br>
          <strong>ไฟล์ JPG หลังกล้อง</strong><br>
          ขนาด 3000px<br>
          ไม่ทำสี ไม่แต่งภาพ<br>
          รับไฟล์ด่วนได้ทันที
        </div>
      </div>
    `;
  }

  if(pkgType === "neutral"){
    sampleSection.classList.remove("hide");
    sampleArea.innerHTML = `
      <div class="sample-box">
        <img src="image/sample-neutral.jpg" alt="ตัวอย่างแต่งภาพสีกลาง">
        <div class="sample-info">
          <div class="sample-tag">สีกลาง</div><br>
          <strong>แต่งภาพสีกลาง</strong><br>
          สีสุภาพ ดูง่าย ใช้งานได้กว้าง<br>
          ได้ไฟล์ใหญ่ + 2048px
        </div>
      </div>
    `;
  }

  if(pkgType === "pageTone"){
    sampleSection.classList.add("hide");
    sampleArea.innerHTML = "";
  }
}

function renderTone(){
  const pkg = document.querySelector('input[name="package"]:checked');
  const toneSection = document.getElementById("toneSection");

  if(pkg.dataset.type === "pageTone"){
    toneSection.classList.remove("hide");
  }else{
    toneSection.classList.add("hide");
  }
}

function renderTonePreview(){
  const pkg = document.querySelector('input[name="package"]:checked');
  const tonePreview = document.getElementById("tonePreview");

  if(pkg.dataset.type !== "pageTone"){
    tonePreview.innerHTML = "";
    return;
  }

  const tone = document.querySelector('input[name="mainTone"]:checked').value;

  tonePreview.innerHTML = `
    <div class="sample-box">
      <img src="image/tone-${tone.toLowerCase()}.jpg" alt="ตัวอย่างโทน ${tone}">
      <div class="sample-info">
        <div class="sample-tag">โทน ${tone}</div><br>
        <strong>ตัวอย่างแต่งภาพโทนเพจ โทน ${tone}</strong><br>
        ใช้เป็นโทนหลักของชุดภาพนี้<br>
        ได้ไฟล์ใหญ่ + 2048px
      </div>
    </div>
  `;
}

function renderOptions(){
  const pkg = document.querySelector('input[name="package"]:checked');
  const pkgType = pkg.dataset.type;

  const optionArea = document.getElementById("optionArea");
  const optionSection = document.getElementById("optionSection");
  const optionTitle = document.getElementById("optionTitle");

  optionArea.innerHTML = "";

  let options = [];

  const selectedMainTone =
    document.querySelector('input[name="mainTone"]:checked')?.value || "";

  if(pkgType === "jpg"){
    options = [
      "รับไฟล์ RAW เพิ่ม"
    ];
  }

  if(pkgType === "neutral"){
    options = [
      "รับไฟล์ RAW เพิ่ม",
      "รับโทนเพิ่ม โทน A",
      "รับโทนเพิ่ม โทน B",
      "รับโทนเพิ่ม โทน C"
    ];
  }

  if(pkgType === "pageTone"){
    options = [
      "รับไฟล์ RAW เพิ่ม",
      "รับไฟล์สีกลางเพิ่ม",
      "รับโทนเพิ่ม โทน A",
      "รับโทนเพิ่ม โทน B",
      "รับโทนเพิ่ม โทน C"
    ];

    options = options.filter(opt=>{
      return !opt.includes("โทน " + selectedMainTone);
    });
  }

  if(pkgType === "pageTone"){
    optionTitle.innerText = "4. Option เพิ่ม รายการละ 100฿";
  }else{
    optionTitle.innerText = "3. Option เพิ่ม รายการละ 100฿";
  }

  if(options.length === 0){
    optionSection.classList.add("hide");
    return;
  }

  optionSection.classList.remove("hide");

  options.forEach(opt=>{
    optionArea.innerHTML += `
      <label class="option-card">
        <input
          type="checkbox"
          class="option"
          data-name="${opt}"
          value="100"
        >
        <div class="title">${opt}</div>
        <div class="desc">เพิ่ม 100฿</div>
      </label>
    `;
  });

  document.querySelectorAll('.option').forEach(el=>{
    el.addEventListener('change',calculate);
  });
}

function calculate(){
  const pkg = document.querySelector('input[name="package"]:checked');

  let total = Number(pkg.value);
  let options = [];

  document.querySelectorAll('.option').forEach(el=>{
    if(el.checked){
      total += 100;
      options.push(el.dataset.name);
    }
  });

  document.getElementById("total").innerText = total;

  const tripText =
    document.querySelector('input[name="tripType"]:checked').value === "single"
    ? "ขาเดียว ขาขึ้นหรือขาลง"
    : "2 ขา ขาขึ้น + ขาลง";

  const toneLine =
    pkg.dataset.type === "pageTone"
    ? `โทนภาพหลัก: โทน ${document.querySelector('input[name="mainTone"]:checked').value}\n`
    : "";

  document.getElementById("summary").value =
`สรุปราคาภาพถ่าย

ประเภท: ${tripText}
แพ็กเกจ: ${pkg.dataset.name}
${toneLine}Option เพิ่ม: ${options.length ? options.join(", ") : "ไม่มี"}

รวมทั้งหมด: ${total} บาท`;
}

function copySummary(){
  const text = document.getElementById("summary").value;

  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>{
      alert("คัดลอกข้อความแล้ว");
    });
  }else{
    const textarea = document.getElementById("summary");
    textarea.select();
    document.execCommand("copy");
    alert("คัดลอกข้อความแล้ว");
  }
}

document.querySelectorAll('input[name="tripType"]').forEach(el=>{
  el.addEventListener('change',renderPackages);
});

document.querySelectorAll('input[name="mainTone"]').forEach(el=>{
  el.addEventListener('change',()=>{
    renderTonePreview();
    renderOptions();
    calculate();
  });
});

renderPackages();
</script>

</body>
</html>
