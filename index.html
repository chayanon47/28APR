<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คำนวณราคาภาพ 28APR</title>

<style>
body{
    font-family: system-ui,sans-serif;
    background:#111;
    color:#fff;
    margin:0;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:#1b1b1b;
    padding:25px;
    border-radius:15px;
}

h1{
    text-align:center;
    color:#ffcc00;
}

.card{
    background:#2a2a2a;
    padding:12px;
    border-radius:10px;
    margin:8px 0;
}

label{
    display:block;
    cursor:pointer;
}

input{
    margin-right:8px;
}

.total{
    margin-top:20px;
    font-size:36px;
    font-weight:bold;
    color:#00ff88;
    text-align:center;
}

textarea{
    width:100%;
    height:140px;
    margin-top:15px;
    border-radius:10px;
    padding:10px;
    font-size:15px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#ffcc00;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

<h1>คำนวณราคาภาพ</h1>

<h2>เลือกประเภทเหมา</h2>

<div class="card">
<label>
<input type="radio" name="tripType" value="single" checked>
เหมาภาพ ขาขึ้นหรือขาลง (ขาเดียว)
</label>
</div>

<div class="card">
<label>
<input type="radio" name="tripType" value="both">
เหมาภาพทั้งหมด ขาขึ้น + ขาลง
</label>
</div>

<h2>เลือกแพ็กเกจ</h2>

<div id="packageArea"></div>

<h2>🔥 Option เพิ่ม (รายการละ 100฿)</h2>

<div class="card">
<label>
<input type="checkbox" class="option" value="100">
ไฟล์ RAW
</label>
</div>

<div class="card">
<label>
<input type="checkbox" class="option" value="100">
รับโทนเพิ่ม
</label>
</div>

<div class="card">
<label>
<input type="checkbox" class="option" value="100">
สีกลางเพิ่ม
</label>
</div>

<div class="total">
รวม <span id="total">300</span> ฿
</div>

<textarea id="summary" readonly></textarea>

<button onclick="copySummary()">
คัดลอกข้อความสรุป
</button>

</div>

<script>

const prices = {
    single: [
        {
            name:"ภาพหลังกล้อง JPG 3000px",
            price:300
        },
        {
            name:"แต่งภาพสีกลาง ไฟล์ใหญ่ + 2048px",
            price:400
        },
        {
            name:"แต่งภาพโทนเพจ ไฟล์ใหญ่ + 2048px",
            price:500
        }
    ],
    both: [
        {
            name:"ภาพหลังกล้อง JPG 3000px",
            price:500
        },
        {
            name:"แต่งภาพสีกลาง ไฟล์ใหญ่ + 2048px",
            price:800
        },
        {
            name:"แต่งภาพโทนเพจ ไฟล์ใหญ่ + 2048px",
            price:1000
        }
    ]
};

function renderPackages(){

    const tripType =
        document.querySelector(
            'input[name="tripType"]:checked'
        ).value;

    const area =
        document.getElementById("packageArea");

    area.innerHTML = "";

    prices[tripType].forEach((pkg,index)=>{

        area.innerHTML += `
        <div class="card">
            <label>
                <input
                    type="radio"
                    name="package"
                    value="${pkg.price}"
                    data-name="${pkg.name}"
                    ${index===0 ? "checked" : ""}
                >
                ${pkg.price}฿ — ${pkg.name}
            </label>
        </div>
        `;
    });

    document
        .querySelectorAll('input[name="package"]')
        .forEach(el=>{
            el.addEventListener('change',calculate);
        });

    calculate();
}

function calculate(){

    const pkg =
        document.querySelector(
            'input[name="package"]:checked'
        );

    let total =
        Number(pkg.value);

    let options = [];

    document
        .querySelectorAll('.option')
        .forEach(el=>{

            if(el.checked){
                total += 100;

                options.push(
                    el.parentElement.innerText
                    .replace('+100฿','')
                    .trim()
                );
            }
        });

    document.getElementById("total")
        .innerText = total;

    const tripText =
        document.querySelector(
            'input[name="tripType"]:checked'
        ).value === "single"
        ? "ขาขึ้นหรือขาลง (ขาเดียว)"
        : "ขาขึ้น + ขาลง";

    let summary =
`สรุปรายการ

ประเภท:
${tripText}

แพ็กเกจ:
${pkg.dataset.name}

Option:
${options.length ? options.join(', ') : 'ไม่มี'}

รวมทั้งหมด:
${total} บาท`;

    document.getElementById("summary")
        .value = summary;
}

function copySummary(){

    const textarea =
        document.getElementById("summary");

    textarea.select();

    navigator.clipboard.writeText(
        textarea.value
    );

    alert("คัดลอกแล้ว");
}

document
    .querySelectorAll(
        'input[name="tripType"]'
    )
    .forEach(el=>{
        el.addEventListener(
            'change',
            renderPackages
        );
    });

document
    .querySelectorAll('.option')
    .forEach(el=>{
        el.addEventListener(
            'change',
            calculate
        );
    });

renderPackages();

</script>

</body>
</html>
