<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>คำนวณราคาภาพถ่าย</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
    }
    .box {
      max-width: 520px;
      margin: auto;
      background: #1c1c1c;
      padding: 24px;
      border-radius: 18px;
    }
    h1 { color: #ffcc00; }
    label {
      display: block;
      background: #2a2a2a;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      cursor: pointer;
    }
    input { margin-right: 8px; }
    .total {
      font-size: 34px;
      font-weight: bold;
      color: #00ff99;
      margin-top: 20px;
    }
    textarea {
      width: 100%;
      height: 120px;
      margin-top: 15px;
      border-radius: 10px;
      padding: 10px;
      font-size: 15px;
    }
    button {
      width: 100%;
      padding: 14px;
      border: 0;
      border-radius: 12px;
      background: #ffcc00;
      font-size: 18px;
      font-weight: bold;
      margin-top: 12px;
      cursor: pointer;
    }
    .note {
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>คำนวณราคาภาพถ่าย</h1>
  <p class="note">เรทเหมาภาพ ขาขึ้น / ขาลง ขาเดียว</p>

  <h3>เลือกแพ็กเกจหลัก</h3>

  <label>
    <input type="radio" name="package" value="300" data-name="ภาพหลังกล้อง JPG 3000px" checked>
    300฿ — ภาพหลังกล้อง JPG 3000px
  </label>

  <label>
    <input type="radio" name="package" value="400" data-name="แต่งภาพสีกลาง ไฟล์ใหญ่ + 2048px">
    400฿ — แต่งภาพสีกลาง ไฟล์ใหญ่ + 2048px
  </label>

  <label>
    <input type="radio" name="package" value="500" data-name="แต่งภาพโทนเพจ ไฟล์ใหญ่ + 2048px">
    500฿ — แต่งภาพโทนเพจ ไฟล์ใหญ่ + 2048px
  </label>

  <h3>🔥 Option เพิ่ม รายการละ 100฿</h3>

  <label>
    <input type="checkbox" class="option" value="100" data-name="ไฟล์ RAW">
    ไฟล์ RAW +100฿
  </label>

  <label>
    <input type="checkbox" class="option" value="100" data-name="รับโทนเพิ่ม">
    รับโทนเพิ่ม +100฿
  </label>

  <label>
    <input type="checkbox" class="option" value="100" data-name="สีกลางเพิ่ม">
    สีกลางเพิ่ม +100฿
  </label>

  <div class="total">รวม: <span id="total">300</span>฿</div>

  <textarea id="summary" readonly></textarea>

  <button onclick="copySummary()">คัดลอกข้อความสรุป</button>
</div>

<script>
  const packages = document.querySelectorAll('input[name="package"]');
  const options = document.querySelectorAll('.option');
  const totalEl = document.getElementById('total');
  const summaryEl = document.getElementById('summary');

  function calculate() {
    const selectedPackage = document.querySelector('input[name="package"]:checked');
    let total = Number(selectedPackage.value);

    let optionText = [];
    options.forEach(option => {
      if (option.checked) {
        total += Number(option.value);
        optionText.push(option.dataset.name);
      }
    });

    totalEl.textContent = total;

    let summary = `สรุปราคาภาพถ่าย\n`;
    summary += `แพ็กเกจ: ${selectedPackage.dataset.name}\n`;

    if (optionText.length > 0) {
      summary += `Option เพิ่ม: ${optionText.join(", ")}\n`;
    } else {
      summary += `Option เพิ่ม: ไม่มี\n`;
    }

    summary += `รวมทั้งหมด: ${total}฿`;

    summaryEl.value = summary;
  }

  function copySummary() {
    summaryEl.select();
    document.execCommand("copy");
    alert("คัดลอกข้อความแล้ว");
  }

  packages.forEach(item => item.addEventListener('change', calculate));
  options.forEach(item => item.addEventListener('change', calculate));

  calculate();
</script>

</body>
</html>
